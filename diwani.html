<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nitish 🤍 Diwani</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #080808;
    color: #f0f0f0;
    font-family: 'Crimson Text', serif;
    height: 100vh;
    height: -webkit-fill-available;
    overflow: hidden;
    user-select: none;
    touch-action: none;
  }

  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center;
    transition: opacity 0.7s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* INTRO */
  .intro-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 5vw, 1.8rem);
    font-weight: 400; letter-spacing: 5px;
    margin-bottom: 6px; animation: fadeUp 1s ease both;
  }
  .intro-sub {
    font-style: italic; color: #444; font-size: 0.85rem;
    margin-bottom: 32px; animation: fadeUp 1s 0.2s ease both; letter-spacing: 1px;
  }
  .couple-wrap {
    width: 160px; height: 160px; margin-bottom: 28px;
    animation: fadeUp 1s 0.3s ease both; position: relative;
  }
  .fh-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .fh { position: absolute; font-size: 0.9rem; opacity: 0; animation: fhA 4s ease-in-out infinite; }
  .fh:nth-child(1) { left: 10%; animation-delay: 0s; }
  .fh:nth-child(2) { left: 46%; animation-delay: 1.5s; }
  .fh:nth-child(3) { left: 74%; animation-delay: 3s; }
  @keyframes fhA { 0%{opacity:0;transform:translateY(10px) scale(.5)} 25%{opacity:1} 100%{opacity:0;transform:translateY(-60px) scale(1)} }

  .start-btn {
    background: transparent; border: 1px solid #f0f0f0; color: #f0f0f0;
    font-family: 'Crimson Text', serif; font-size: 1rem; letter-spacing: 3px;
    padding: 13px 42px; cursor: pointer; transition: all .2s;
    animation: fadeUp 1s 0.5s ease both; text-transform: uppercase;
    border-radius: 0; -webkit-appearance: none;
  }
  .start-btn:active { background: #f0f0f0; color: #080808; }

  /* GAME */
  #gameScreen { padding: 0; justify-content: flex-start; }

  .hud {
    width: 100%; display: flex; justify-content: space-between;
    padding: 10px 24px 8px; background: #080808;
    border-bottom: 1px solid #111; flex-shrink: 0; align-items: center;
  }
  .hud-item { text-align: center; }
  .hud-label { font-size: 0.55rem; letter-spacing: 2px; color: #333; text-transform: uppercase; }
  .hud-val { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #f0f0f0; }

  canvas { display: block; touch-action: none; }

  /* WIN */
  .win-emoji { font-size: 2.8rem; margin-bottom: 12px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

  .win-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 5.5vw, 2.2rem); font-weight: 700;
    margin-bottom: 6px; animation: fadeUp .8s ease both;
  }
  .win-score {
    font-size: 0.8rem; color: #444; letter-spacing: 2px;
    margin-bottom: 24px; animation: fadeUp .8s .2s ease both;
  }
  .win-message audio {
  width: 100%;
  margin-top: 10px;
  filter: invert(1) grayscale(1);
  opacity: 0.85;
  }
  .win-from {
    font-size: 0.72rem; color: #2e2e2e; letter-spacing: 3px;
    margin-bottom: 28px; animation: fadeUp .8s .6s ease both; text-transform: uppercase;
  }
  .replay-btn {
    background: transparent; border: 1px solid #1e1e1e; color: #3a3a3a;
    font-family: 'Crimson Text', serif; font-size: .88rem; letter-spacing: 3px;
    padding: 12px 28px; cursor: pointer; transition: all .2s;
    animation: fadeUp .8s .8s ease both; text-transform: uppercase;
    border-radius: 0; -webkit-appearance: none;
  }
  .replay-btn:active { border-color: #f0f0f0; color: #f0f0f0; }

  .win-particles { position: fixed; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
  .wp { position: absolute; top: -30px; font-size: 1.2rem; animation: fallS linear forwards; opacity: .55; }
  @keyframes fallS { to { top: 110vh; opacity: 0; } }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- INTRO -->
<div class="screen" id="introScreen">
  <p class="intro-title">NITISH  ×  DIWANI</p>
  <p class="intro-sub">a little game, made with love</p>
  <div class="couple-wrap">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="160" height="160">
      <circle cx="72" cy="60" r="22" fill="none" stroke="#f0f0f0" stroke-width="1.5"/>
      <rect x="52" y="84" width="40" height="50" rx="8" fill="none" stroke="#f0f0f0" stroke-width="1.5"/>
      <line x1="52" y1="100" x2="36" y2="120" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="92" y1="100" x2="108" y2="120" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="62" y1="134" x2="58" y2="165" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="82" y1="134" x2="86" y2="165" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="64" cy="57" r="2" fill="#f0f0f0"/>
      <circle cx="80" cy="57" r="2" fill="#f0f0f0"/>
      <path d="M66 68 Q72 74 78 68" stroke="#f0f0f0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M50 54 Q52 38 72 38 Q92 38 94 54" stroke="#f0f0f0" stroke-width="1.5" fill="none"/>
      <circle cx="132" cy="60" r="22" fill="none" stroke="#f0f0f0" stroke-width="1.5"/>
      <path d="M112 84 L152 84 L162 165 L102 165 Z" fill="none" stroke="#f0f0f0" stroke-width="1.5"/>
      <line x1="112" y1="100" x2="96" y2="120" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="152" y1="100" x2="168" y2="120" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="124" cy="57" r="2" fill="#f0f0f0"/>
      <circle cx="140" cy="57" r="2" fill="#f0f0f0"/>
      <path d="M126 68 Q132 74 138 68" stroke="#f0f0f0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M110 54 Q112 35 132 35 Q152 35 154 54" stroke="#f0f0f0" stroke-width="1.5" fill="none"/>
      <path d="M110 60 Q106 90 108 120" stroke="#f0f0f0" stroke-width="1.2" fill="none" opacity="0.4"/>
      <path d="M154 60 Q158 90 156 120" stroke="#f0f0f0" stroke-width="1.2" fill="none" opacity="0.4"/>
      <path d="M108 118 Q120 128 132 118" stroke="#f0f0f0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M97 45 C97 40 90 38 90 44 C90 50 97 55 97 55 C97 55 104 50 104 44 C104 38 97 40 97 45Z" fill="#f0f0f0" opacity="0.8"/>
    </svg>
    <div class="fh-wrap">
      <div class="fh">🤍</div><div class="fh">🤍</div><div class="fh">🤍</div>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">Begin ›</button>
</div>

<!-- GAME -->
<div class="screen hidden" id="gameScreen">
  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">Caught</div>
      <div class="hud-val" id="scoreEl">0 / 30</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Time</div>
      <div class="hud-val" id="timeEl">60</div>
    </div>
  </div>
  <canvas id="canvas"></canvas>
</div>

<!-- WIN -->
<div class="screen hidden" id="winScreen">
  <div class="win-particles" id="winParticles"></div>
  <div class="win-emoji">🤍</div>
  <div class="win-title">You Caught My Heart</div>
  <div class="win-score" id="winScoreEl"></div>
  <div class="win-message">

  <p style="
    margin-bottom:18px;
    color:#888;
    font-style:italic;
    line-height:1.8;
  ">
    A song for you 🤍
  </p>

  <audio id="loveSong" controls>
    <source src="love.wav" type="audio/wav">
  </audio>

</div>
  <div class="win-from">— Nitish, tumhara 🤍</div>
  <button class="replay-btn" onclick="replay()">Play Again</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const GOAL = 30;

let W, H, score, timeLeft, gameRunning, timerInterval, animFrame, hearts, sparks;

const nitish = { x: 0, y: 0, dir: 1, speed: 0, dropCooldown: 0 };
const diwani = { x: 0, targetX: 0 };

// Touch
let lastTouchX = null;
document.addEventListener('touchstart', e => {
  lastTouchX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener('touchmove', e => {
  e.preventDefault();
  if (lastTouchX === null || !gameRunning) return;
  const dx = e.touches[0].clientX - lastTouchX;
  diwani.targetX += dx * 1.3;
  diwani.targetX = Math.max(28, Math.min(W - 28, diwani.targetX));
  lastTouchX = e.touches[0].clientX;
}, { passive: false });

document.addEventListener('touchend', () => { lastTouchX = null; });

// Keyboard
const keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup',   e => keys[e.key] = false);

function resize() {
  const hudH = document.querySelector('.hud').offsetHeight;
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight - hudH;
}

function dropHeart() {
  // Hearts drop from Nitish with varied speed and angles — harder to catch
  const angle = (Math.random() - 0.5) * 1.2; // wider spread
  hearts.push({
    x: nitish.x + (Math.random() - 0.5) * 20,
    y: nitish.y + 58,
    vy: 4 + Math.random() * 3,       // faster fall
    vx: Math.sin(angle) * 2.5,       // more sideways drift
    wobble: (Math.random() - 0.5) * 0.15, // wobble factor
    size: 18 + Math.random() * 10,
    emoji: Math.random() < 0.68 ? '🤍' : ['💌','⭐','🌸','🌙'][Math.floor(Math.random()*4)],
  });
}

function addSpark(x, y) {
  for (let i = 0; i < 7; i++) {
    const angle = (Math.PI * 2 / 7) * i;
    sparks.push({
      x, y,
      vx: Math.cos(angle) * (2 + Math.random() * 3),
      vy: Math.sin(angle) * (2 + Math.random() * 3),
      life: 1,
    });
  }
}

function drawNitish(x, y) {
  ctx.save();
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1.6;
  ctx.lineCap = 'round';
  // Head
  ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI*2); ctx.stroke();
  // Hair
  ctx.beginPath(); ctx.arc(x, y, 12, Math.PI, 0); ctx.stroke();
  // Body
  ctx.beginPath(); ctx.moveTo(x, y+12); ctx.lineTo(x, y+36); ctx.stroke();
  // Left arm
  ctx.beginPath(); ctx.moveTo(x, y+18); ctx.lineTo(x-16, y+28); ctx.stroke();
  // Right arm — dropping hearts
  ctx.beginPath(); ctx.moveTo(x, y+18); ctx.lineTo(x+16, y+34); ctx.stroke();
  // Legs
  ctx.beginPath(); ctx.moveTo(x, y+36); ctx.lineTo(x-10, y+52); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y+36); ctx.lineTo(x+10, y+52); ctx.stroke();
  // Eyes & smile
  ctx.fillStyle = '#e0e0e0';
  ctx.beginPath(); ctx.arc(x-4, y-2, 1.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+4, y-2, 1.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x, y+5, 4, 0.15, Math.PI-0.15); ctx.stroke();
  // Name
  ctx.font = 'italic 9px Crimson Text';
  ctx.fillStyle = '#2a2a2a';
  ctx.textAlign = 'center';
  ctx.fillText('Nitish', x, y+64);
  ctx.restore();
}

function drawDiwani(x, y) {
  ctx.save();
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1.6;
  ctx.lineCap = 'round';
  // Head
  ctx.beginPath(); ctx.arc(x, y-52, 12, 0, Math.PI*2); ctx.stroke();
  // Long hair
  ctx.beginPath(); ctx.moveTo(x-12, y-46); ctx.quadraticCurveTo(x-22, y-22, x-20, y-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+12, y-46); ctx.quadraticCurveTo(x+22, y-22, x+20, y-4); ctx.stroke();
  // Dress
  ctx.beginPath();
  ctx.moveTo(x-13, y-40);
  ctx.lineTo(x+13, y-40);
  ctx.lineTo(x+19, y-4);
  ctx.lineTo(x-19, y-4);
  ctx.closePath(); ctx.stroke();
  // Arms UP — catching
  ctx.beginPath(); ctx.moveTo(x-13, y-30); ctx.lineTo(x-28, y-50); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+13, y-30); ctx.lineTo(x+28, y-50); ctx.stroke();
  // Eyes & smile
  ctx.fillStyle = '#e0e0e0';
  ctx.beginPath(); ctx.arc(x-4, y-55, 1.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+4, y-55, 1.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x, y-48, 4, 0.15, Math.PI-0.15); ctx.stroke();
  // Name
  ctx.font = 'italic 9px Crimson Text';
  ctx.fillStyle = '#2a2a2a';
  ctx.textAlign = 'center';
  ctx.fillText('Diwani', x, y+8);
  ctx.restore();
}

function update() {
  if (!gameRunning) return;

  // Nitish moves left-right — gets faster as score increases
  nitish.speed = 2.2 + score * 0.08;
  if (nitish.speed > 5) nitish.speed = 5;
  nitish.x += nitish.dir * nitish.speed;
  if (nitish.x > W - 36) { nitish.x = W - 36; nitish.dir = -1; }
  if (nitish.x < 36)     { nitish.x = 36;      nitish.dir =  1; }

  // Drop hearts — more frequent as score increases
  nitish.dropCooldown--;
  const dropRate = Math.max(10, 30 - score);
  if (nitish.dropCooldown <= 0) {
    dropHeart();
    nitish.dropCooldown = dropRate;
  }

  // Keyboard
  if (keys['ArrowLeft'])  diwani.targetX -= 8;
  if (keys['ArrowRight']) diwani.targetX += 8;
  diwani.targetX = Math.max(28, Math.min(W - 28, diwani.targetX));

  // Smooth Diwani follow
  diwani.x += (diwani.targetX - diwani.x) * 0.22;

  // Move hearts — wobble + drift
  hearts.forEach(h => {
    h.y  += h.vy;
    h.x  += h.vx;
    h.vx += h.wobble; // gradual drift
    // Slight speed up as falling
    h.vy += 0.04;
  });

  // Catch check — Diwani hands at top
  const catchY = H - 20 - 52;
  hearts = hearts.filter(h => {
    const dx = Math.abs(h.x - diwani.x);
    const dy = Math.abs(h.y - catchY);
    // Smaller catch zone — harder!
    if (dx < 32 && dy < 32) {
      score++;
      document.getElementById('scoreEl').textContent = score + ' / 30';
      addSpark(diwani.x, catchY);
      if (score >= GOAL) { winGame(); return false; }
      return false;
    }
    return h.y < H + 30;
  });

  // Sparks
  sparks = sparks.filter(s => {
    s.x += s.vx; s.y += s.vy;
    s.vx *= 0.92; s.vy *= 0.92;
    s.life -= 0.07;
    return s.life > 0;
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.016)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 44) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 44) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Progress bar
  ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fillRect(0,0,W,3);
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fillRect(0,0,W*(score/GOAL),3);

  // Nitish
  drawNitish(nitish.x, nitish.y);

  // Hearts
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  hearts.forEach(h => {
    ctx.font = h.size + 'px serif';
    ctx.fillText(h.emoji, h.x, h.y);
  });

  // Sparks
  sparks.forEach(s => {
    ctx.globalAlpha = s.life * 0.8;
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath(); ctx.arc(s.x, s.y, 2.5, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Diwani
  drawDiwani(diwani.x, H - 20);

  // Catch zone — subtle arc
  ctx.beginPath();
  ctx.arc(diwani.x, H - 72, 34, Math.PI, 0);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1; ctx.stroke();

  // Missed hearts hint (bottom)
  ctx.font = 'italic 10px Crimson Text';
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.textAlign = 'center';
  ctx.fillText(score + ' / 30 hearts', W/2, H - 8);
}

function gameLoop() { update(); draw(); animFrame = requestAnimationFrame(gameLoop); }

function startGame() {
  score = 0; timeLeft = 60; hearts = []; sparks = [];
  gameRunning = true;
  resize();

  nitish.x = W / 2; nitish.y = 40;
  nitish.dir = 1; nitish.speed = 2.2;
  nitish.dropCooldown = 20;

  diwani.x = W / 2; diwani.targetX = W / 2;

  document.getElementById('introScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  document.getElementById('scoreEl').textContent = '0 / 30';
  document.getElementById('timeEl').textContent = '60';

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timeEl').textContent = timeLeft;
    if (timeLeft <= 0) timeUp();
  }, 1000);

  cancelAnimationFrame(animFrame);
  gameLoop();
}

function winGame() {
  gameRunning = false;
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);
  document.getElementById('winScoreEl').textContent = score + ' hearts caught 🤍';
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.remove('hidden');
  launchParticles();
}

function timeUp() {
  if (score >= GOAL) { winGame(); return; }
  gameRunning = false;
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);
  ctx.clearRect(0, 0, W, H);
  ctx.font = 'italic 16px Playfair Display';
  ctx.fillStyle = '#f0f0f0';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Almost! Try again 🤍', W/2, H/2);
  setTimeout(() => startGame(), 2200);
}

function launchParticles() {
  const c = document.getElementById('winParticles');
  c.innerHTML = '';
  const em = ['🤍','💌','⭐','🌸','🌙','✨'];
  for (let i = 0; i < 22; i++) {
    const e = document.createElement('div');
    e.className = 'wp';
    e.textContent = em[Math.floor(Math.random()*em.length)];
    e.style.left = Math.random()*100+'vw';
    e.style.animationDuration = (3.5+Math.random()*4)+'s';
    e.style.animationDelay = Math.random()*2.5+'s';
    c.appendChild(e);
  }
}

function replay() { startGame(); }
</script>
</body>
</html>
